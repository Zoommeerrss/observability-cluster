##################################
# otel-collector-monitor.yaml    #
##################################
apiVersion: ://coreos.com
kind: ServiceMonitor
metadata:
  name: opentelemetry-collector-monitor
  namespace: observability
  labels:
    release: kube-stack
spec:
  selector:
    matchLabels:
      app: otel-collector
  endpoints:
    - port: metrics-prom
      interval: 15s
      path: /metrics
