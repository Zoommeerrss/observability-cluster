##################################
# otel-collector-service.yaml    #
##################################

apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector

spec:
  replicas: 1

  selector:
    matchLabels:
      app: otel-collector

  template:
    metadata:
      labels:
        app: otel-collector

    spec:
      containers:

      - name: otel-collector

        image: otel/opentelemetry-collector-contrib:0.110.0

        args:
          - "--config=/conf/otel-collector-config.yaml"

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi

        ports:

        - name: otlp-grpc
          containerPort: 4317

        - name: otlp-http
          containerPort: 4318

        - name: metrics-prom
          containerPort: 8889

        - name: telemetry
          containerPort: 8888

        livenessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 15
          periodSeconds: 20

        readinessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 10
          periodSeconds: 10

        volumeMounts:
        - name: config-volume
          mountPath: /conf

      volumes:
      - name: config-volume
        configMap:
          name: otel-collector-config

---

apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector

spec:
  type: NodePort

  selector:
    app: otel-collector

  ports:

  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    nodePort: 30317

  - name: otlp-http
    port: 4318
    targetPort: 4318
    nodePort: 30318

  - name: metrics-prom
    port: 8889
    targetPort: 8889
    nodePort: 30889

  - name: telemetry
    port: 8888
    targetPort: 8888

  - name: health-check
    port: 13133
    targetPort: 13133