###################################
# otel-collector-config.yaml      #
###################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability

data:
  otel-collector-config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:

      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64

      batch:

    exporters:

      debug:
        verbosity: normal

      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: "observability"

      otlp/tempo:
        endpoint: tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true

    service:

      extensions:
        - health_check

      telemetry:
        metrics:
          address: "0.0.0.0:8888"

      pipelines:

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]

        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo, debug]

        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]