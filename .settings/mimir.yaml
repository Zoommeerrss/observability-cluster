##################################
# mimir.yaml                     #
##################################

apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: observability
data:
  mimir.yaml: |
    target: all

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      grpc_listen_address: 0.0.0.0

    multitenancy_enabled: false

    common:
      storage:
        backend: filesystem

    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: inmemory

    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    compactor:
      data_dir: /data/mimir/compactor
      sharding_ring:
        kvstore:
          store: inmemory

    blocks_storage:
      backend: filesystem
      bucket_store:
        sync_dir: /data/mimir/tsdb-sync
      filesystem:
        dir: /data/mimir/data/tsdb
      tsdb:
        dir: /data/mimir/tsdb

    alertmanager:
      data_dir: /data/mimir/alertmanager
      sharding_ring:
        kvstore:
          store: inmemory

    ruler:
      rule_path: /data/mimir/rules
      # CORREÇÃO CRÍTICA: Corrigido o IP de loopback completo com a porta HTTP correta
      alertmanager_url: http://127.0.0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: observability
  labels:
    app: mimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
      containers:
        - name: mimir
          image: grafana/mimir:2.12.0
          imagePullPolicy: IfNotPresent
          workingDir: /data/mimir
          args:
            - "-config.file=/etc/mimir/mimir.yaml"
          ports:
            - containerPort: 9009
              name: http-metrics
            - containerPort: 9095
              name: grpc-metrics
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: "200m"
              memory: 512Mi
          volumeMounts:
            - name: config-volume
              mountPath: /etc/mimir
            - name: storage-volume
              mountPath: /data/mimir
      volumes:
        - name: config-volume
          configMap:
            name: mimir-config
        - name: storage-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: observability
spec:
  selector:
    app: mimir
  ports:
    - name: http
      port: 9009
      targetPort: 9009
    - name: grpc
      port: 9095
      targetPort: 9095
